<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="../../static/css/style.css">
</head>
<body>
{% include "./front/Share/navbar.html" %}

{% block content %}
<div class="container">
    <div style="max-width: 500px; margin: 2rem auto;">
        <div style="background: white; border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-lg);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-mobile-alt" style="font-size: 3rem; color: var(--primary);"></i>
                <h2 style="margin-top: 1rem;">Welcome Back</h2>
                <p style="color: var(--gray);">Sign in to your account</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Email Address</label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                        <input type="email" name="email" placeholder="Enter your email" required
                               style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--light-gray); border-radius: 0.5rem; font-size: 1rem;">
                    </div>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--gray);"></i>
                        <input type="password" name="password" placeholder="Enter your password" required
                               style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid var(--light-gray); border-radius: 0.5rem; font-size: 1rem;">
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="{{ url_for('forget_password') }}" style="color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" style="width: 100%; padding: 0.75rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s;">
                    Sign In
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--light-gray);">
                <p style="color: var(--gray);">Don't have an account?
                    <a href="{{ url_for('create_user') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% include "./front/Share/footer.html" %}
</body>
</html>
